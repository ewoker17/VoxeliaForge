<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VoxeliaForge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a14;
  color: white;
}

/* 🔥 LOADING SCREEN */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

.loader {
  border: 5px solid #222;
  border-top: 5px solid cyan;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
  border-bottom: 2px solid cyan;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: cyan;
}

.tabs button {
  background: none;
  border: none;
  color: white;
  margin: 0 10px;
  cursor: pointer;
}

.tabs button:hover {
  color: cyan;
}

/* MAIN */
.container {
  display: flex;
  height: calc(100vh - 50px);
}

/* SERVERS */
.servers {
  width: 220px;
  background: #141428;
  padding: 10px;
  overflow-y: auto;
}

.server {
  padding: 10px;
  margin: 5px 0;
  background: #1f1f3d;
  border-radius: 8px;
  cursor: pointer;
}

.server:hover {
  background: #2a2a5a;
}

#players {
  margin-top: 10px;
  padding: 10px;
  background: #0f1022;
  border-radius: 8px;
}

.player {
  font-size: 14px;
  padding: 3px 0;
  color: #7dd3fc;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.input {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  background: cyan;
  border: none;
  cursor: pointer;
}

/* CHARACTER PICKER */
.character-picker {
  display: none;
  padding: 20px;
}

.character {
  background: #1f1f3d;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <h1>VoxeliaForge</h1>
  <div class="loader"></div>
</div>

<!-- TOP -->
<div class="topbar">
  <div class="logo">⚡ VoxeliaForge</div>
  <div class="tabs">
    <button onclick="showTab('chat')">Chat</button>
    <button onclick="showTab('characters')">Characters</button>
  </div>
</div>

<div class="container">

  <!-- SERVERS -->
  <div class="servers">
    <button onclick="createServer()">+ Create Server</button>
    <div id="serverList"></div>

    <div id="players">
      <b>Players Online</b>
      <div id="playerList"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chatTab">
    <div class="messages" id="messages"></div>
    <div class="input">
      <input id="messageInput" placeholder="Message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- CHARACTER -->
  <div class="character-picker" id="characterTab">
    <h2>Pick Character</h2>
    <div class="character" onclick="pickCharacter('Nova')">Nova</div>
    <div class="character" onclick="pickCharacter('Glitch')">Glitch</div>
    <div class="character" onclick="pickCharacter('Flux')">Flux</div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDuDDTqJbvPCRco3yrs43nZWnzyPkLZAPk",
  authDomain: "voxeliaforge.firebaseapp.com",
  projectId: "voxeliaforge",
  storageBucket: "voxeliaforge.firebasestorage.app",
  messagingSenderId: "72340107431",
  appId: "1:72340107431:web:2e595424bfe3a1726a2b82",
  measurementId: "G-34K36Z0EMM"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USERNAME
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter username:");
  if (!username) username = "Player" + Math.floor(Math.random() * 9999);
  localStorage.setItem("username", username);
}

let currentServer = null;

// LOADING
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
}, 2000);

// TABS
function showTab(tab) {
  document.getElementById("chatTab").style.display = tab === 'chat' ? "flex" : "none";
  document.getElementById("characterTab").style.display = tab === 'characters' ? "block" : "none";
}
showTab('chat');

// CREATE SERVER
function createServer() {
  let name = prompt("Server name?");
  if (!name) return;

  db.ref("servers").push({ name });
}

// LOAD SERVERS
db.ref("servers").on("child_added", snap => {
  let id = snap.key;
  let server = snap.val();

  let div = document.createElement("div");
  div.className = "server";
  div.textContent = server.name;

  div.onclick = () => joinServer(id);

  document.getElementById("serverList").appendChild(div);
});

// JOIN SERVER + PRESENCE
function joinServer(id) {
  currentServer = id;

  let ref = db.ref("servers/" + id + "/players/" + username);

  ref.set({ name: username });
  ref.onDisconnect().remove();

  loadPlayers(id);
}

// LOAD PLAYERS
function loadPlayers(id) {
  db.ref("servers/" + id + "/players").on("value", snap => {
    let list = document.getElementById("playerList");
    list.innerHTML = "";

    snap.forEach(p => {
      let div = document.createElement("div");
      div.className = "player";
      div.textContent = p.val().name;
      list.appendChild(div);
    });
  });
}

// CHAT
function sendMessage() {
  let msg = document.getElementById("messageInput").value;
  if (!msg || !currentServer) return;

  db.ref("servers/" + currentServer + "/chat").push({
    text: username + ": " + msg
  });

  document.getElementById("messageInput").value = "";
}

// CHAT LISTEN
function listenChat(id) {
  db.ref("servers/" + id + "/chat").on("child_added", snap => {
    let msg = snap.val();
    let div = document.createElement("div");
    div.textContent = msg.text;
    document.getElementById("messages").appendChild(div);
  });
}

// CHARACTER
function pickCharacter(name) {
  localStorage.setItem("character", name);
  alert("Selected: " + name);
}
</script>

</body>
</html>
