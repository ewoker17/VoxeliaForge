<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxeliaForge</title>

  <style>
    :root {
      --vault-black: #060608;
      --vault-dark: #0d0e12;
      --vault-panel: rgba(20, 22, 28, 0.8);
      --neon-cyan: #7df9ff;
      --neon-glow: rgba(125, 249, 255, 0.3);
      --text-main: #e0e0e0;
      --text-dim: #808090;
      --border-style: 1px solid rgba(125, 249, 255, 0.15);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--vault-black);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .nav-pillar {
      width: 64px;
      background: var(--vault-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      border-right: var(--border-style);
      gap: 15px;
    }

    .nav-box {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 900;
      color: var(--text-dim);
    }

    .nav-box:hover, .nav-box.active {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .sub-panel {
      width: 260px;
      background: var(--vault-panel);
      display: flex;
      flex-direction: column;
      border-right: var(--border-style);
    }

    .panel-header {
      padding: 20px;
      font-size: 11px;
      color: var(--neon-cyan);
      border-bottom: var(--border-style);
    }

    .menu-item {
      padding: 12px 20px;
      cursor: pointer;
      color: var(--text-dim);
    }

    .menu-item:hover {
      color: white;
    }

    .user-card {
      margin-top: auto;
      padding: 15px;
      border-top: var(--border-style);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .avatar-square {
      width: 36px;
      height: 36px;
      border: 1px solid var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .view-content {
      display: none;
      padding: 40px;
    }

    .view-content.active {
      display: block;
    }

    .btn-neon {
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      background: transparent;
      padding: 10px 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-neon:hover {
      background: var(--neon-cyan);
      color: black;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #111;
      padding: 20px;
      width: 350px;
      border: 1px solid var(--neon-cyan);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: black;
      color: white;
      border: 1px solid #333;
    }

    .server-card {
      background: #111;
      padding: 10px;
      border: 1px solid #333;
      text-align: center;
    }

    .server-card img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      display: block;
      margin: 0 auto 5px;
    }
  </style>
</head>

<body>

<nav class="nav-pillar">
  <div class="nav-box" onclick="switchTab('about')">VF</div>
  <div class="nav-box" onclick="checkAuthAndOpen()">+</div>
</nav>

<aside class="sub-panel">
  <div class="panel-header">VoxeliaForge</div>

  <div class="menu-item" onclick="switchTab('about')">About</div>
  <div class="menu-item" onclick="switchTab('communities')">Communities</div>

  <div class="user-card">
    <div class="avatar-square" id="user-initial">?</div>
    <div>
      <div id="user-name">Guest</div>
      <div id="user-status">Offline</div>
      <div id="logout-btn" onclick="handleLogout()" style="display:none;cursor:pointer;font-size:10px;">Logout</div>
    </div>
  </div>
</aside>

<main class="viewport">

  <div id="about" class="view-content active">
    <h1>VoxeliaForge</h1>
    <a class="btn-neon" href="login.html">Login</a>
    <a class="btn-neon" href="signup.html">Signup</a>
  </div>

  <div id="communities" class="view-content">
    <h2>Communities</h2>
    <div id="server-list-container"></div>
    <button class="btn-neon" onclick="checkAuthAndOpen()">Create</button>
  </div>

</main>

<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Create Node</h3>
    <input id="nodeName" placeholder="Node name">
    <button onclick="submitCreate()" class="btn-neon">Create</button>
    <button onclick="closeCreate()" class="btn-neon">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "voxeliaforge-v589m.firebaseapp.com",
  projectId: "voxeliaforge-v589m",
  storageBucket: "voxeliaforge-v589m.appspot.com",
  messagingSenderId: "300204829415",
  appId: "1:300204829415:web:c73f00c6eaaa03c5669042"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.userIsAuthenticated = false;

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.userIsAuthenticated = true;
    document.getElementById("user-name").innerText = user.email;
    document.getElementById("user-status").innerText = "Online";
    document.getElementById("logout-btn").style.display = "block";
    loadCommunities();
  }
});

window.handleLogout = () => signOut(auth);

function loadCommunities() {
  const q = query(collection(db, "communities"), orderBy("timestamp", "desc"));

  onSnapshot(q, (snap) => {
    const container = document.getElementById("server-list-container");
    container.innerHTML = "";

    snap.forEach(doc => {
      const d = doc.data();

      const div = document.createElement("div");
      div.className = "server-card";

      div.innerHTML = `
        <img src="${d.image || 'https://via.placeholder.com/50'}">
        <div>${d.name}</div>
      `;

      container.appendChild(div);
    });
  });
}

window.submitCreate = async () => {
  const name = document.getElementById("nodeName").value;
  if (!name) return;

  await addDoc(collection(db, "communities"), {
    name,
    image: "",
    timestamp: new Date()
  });

  closeCreate();
};

window.switchTab = (id) => {
  document.querySelectorAll(".view-content").forEach(v => v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

window.checkAuthAndOpen = () => {
  if (!window.userIsAuthenticated) {
    alert("Login required");
    return;
  }
  document.getElementById("modal").style.display = "flex";
};

window.closeCreate = () => {
  document.getElementById("modal").style.display = "none";
};
</script>

</body>
</html>
