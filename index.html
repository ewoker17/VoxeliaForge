<!DOCTYPE html>
<html>
  <title>VoxeliaForge</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #0a0a14;
  color: white;
    }
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
  border-bottom: 2px solid cyan;
}
    .logo {
  font-size: 30px;
  font-weight: bold;
  color: cyan;
}
    .sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 90vh;

  background: #111;
  color: white;
  padding: 15px;

  display: flex;
  flex-direction: column;

  border-right: 2px solid cyan;
}
  .main {
  margin-left: 220px; /* same as sidebar width */
}
  </style>
  <body>
    <div class="main">
      <h1>Friends & Servers</h1>
    </div>
    <div class="topbar">
    <div class="logo">VoxeliaForge</div>
      <div class="sidebar">
  <h2>Menu</h2>
  <p>Servers</p>
  <p>Chat</p>
  <p>Characters</p>
</div>
  </body>
</html>
