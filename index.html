<!DOCTYPE html>
<html>
  <title>VoxeliaForge</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #0a0a14;
  color: white;
    }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding: 20px;
  background: #111;
  border-bottom: 2px solid cyan;
}

/* CENTER LOGO */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  font-weight: bold;
  color: cyan;
  pointer-events: none; /* 🔥 prevents blocking clicks */
}

  .main {
  margin-left: 220px; /* same as sidebar width */
}
  </style>
  <body>
    <div class="main">
    </div>
    <div class="topbar">
    <div class="logo">VoxeliaForge</div>
</div>
  </body>
</html>
