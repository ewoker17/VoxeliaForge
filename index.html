<!DOCTYPE html>
<html>
  <title>VoxeliaForge</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #0a0a14;
  color: white;
    }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding: 10px;
  background: #111;
  border-bottom: 2px solid cyan;
}

/* CENTER LOGO */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  font-weight: bold;
  color: cyan;
  pointer-events: none; /* 🔥 prevents blocking clicks */
}
    .sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100vh;

  background: #111;
  color: white;
  padding: 15px;

  display: flex;
  flex-direction: column;

  border-right: 2px solid cyan;
}
  .main {
  margin-left: 220px; /* same as sidebar width */
}
  </style>
  <body>
    <div class="main">
    </div>
    <div class="topbar">
    <div class="logo">VoxeliaForge</div>
      <div class="sidebar">
  <h2>Friends & Servers</h2>
</div>
  </body>
</html>
