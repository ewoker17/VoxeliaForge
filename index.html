<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxeliaForge Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html {
      scroll-padding-top: 80px;
    }
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0f;
      color: white;
    }

    nav {
      position: sticky;
      top: 0;
      width: 100%;
      background: #12121a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 1px solid #1f1f2e;
      z-index: 1000;
    }

    nav h2 { margin: 0; color: #7df9ff; }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    nav ul li { position: relative; }
    nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
      padding: 5px 8px;
      cursor: pointer;
    }
    nav ul li a:hover { color: #7df9ff; }

    /* Dropdown */
    .dropdown-content {
      display: none;
      position: absolute;
      top: 35px;
      left: 0;
      background: #1a1a2e;
      min-width: 150px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px #000;
      z-index: 100;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 15px;
      color: white;
      white-space: nowrap;
    }

    .dropdown-content a:hover {
      background: #7df9ff33;
      color: #7df9ff;
    }

    /* Sign Up button */
    .signup-btn a {
      text-decoration: none;
      background: #7df9ff;
      color: black;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
      transition: 0.3s;
    }
    .signup-btn a:hover { background: #5fd3d8; }
  </style>
</head>
<body>

<nav>
  <h2>VoxeliaForge</h2>
  <ul>
    <li><a href="#what">What is it?</a></li>
    <li><a href="#features">Features</a></li>
    <li><a href="#vision">Vision</a></li>

    <!-- Dropdown -->
    <li class="dropdown">
      <a onclick="toggleDropdown()">More ▼</a>
      <div class="dropdown-content" id="dropdown-menu">
        <a href="#">Roadmap</a>
        <a href="#">Team</a>
        <a href="#">Contact</a>
        <a href="login.html">Login</a>
      </div>
    </li>

    <!-- Sign Up -->
    <li class="signup-btn"><a href="signup.html">Sign Up</a></li>
  </ul>
</nav>

<script>
  function toggleDropdown() {
    document.getElementById('dropdown-menu').classList.toggle('show');
  }

  // Close dropdown if click outside
  window.onclick = function(event) {
    if (!event.target.matches('.dropdown > a')) {
      var dropdowns = document.getElementsByClassName('dropdown-content');
      for (var i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
      }
    }
  }
</script>

<style>
  /* Show dropdown */
  .dropdown-content.show {
    display: block;
  }
</style>

</body>
</html>
