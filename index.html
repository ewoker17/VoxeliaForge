<!DOCTYPE html>
<html>
  <title>VoxeliaForge</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #0a0a14;
  color: white;
    }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding: 20px;
  background: #111;
  border-bottom: 2px solid cyan;
}
    .staff-card {
    padding: 2rem;
    background: rgba(124, 58, 237, 0.1);
    border: 2px solid var(--primary-purple);
    border-radius: 15px;
    text-align: center;
    transition: var(--transition);
    animation: cardSlideIn 0.6s ease backwards;
    box-shadow: 0 0 5px rgba(168, 85, 247, 0.1);
}

/* CENTER LOGO */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  font-weight: bold;
  color: cyan;
  pointer-events: none; /* 🔥 prevents blocking clicks */
}

  .main {
  margin-left: 220px; /* same as sidebar width */
}
  </style>
  <body>
    <div class="main">
    </div>
    <div class="topbar">
    <div class="logo">VoxeliaForge</div>
</div>
        <div class="info-card">
          <h1>About</h1>
    </div>
  </body>
</html>
