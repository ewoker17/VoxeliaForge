<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxeliaForge | Access Portal</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  display:grid;
  place-items:center;
  background:#05060a;
  color:white;
}

/* glowing background */
body::before {
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(125,249,255,0.15), transparent 60%);
  top:-150px;
  left:-150px;
  filter:blur(40px);
  animation:float 6s infinite ease-in-out;
}

body::after {
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,0,200,0.08), transparent 60%);
  bottom:-150px;
  right:-150px;
  filter:blur(50px);
  animation:float 8s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(20px); }
}

.container {
  width:90%;
  max-width:420px;
  padding:30px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(125,249,255,0.25);
  backdrop-filter:blur(18px);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  position:relative;
  z-index:1;
}

/* title */
.title {
  text-align:center;
  font-size:22px;
  letter-spacing:2px;
  margin-bottom:20px;
  color:#7df9ff;
}

/* input box */
.input {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.input:hover {
  border-color:#7df9ff;
  box-shadow:0 0 10px rgba(125,249,255,0.2);
}

.input i {
  color:#7df9ff;
}

.input input {
  width:100%;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

/* buttons */
.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#7df9ff,#6c63ff);
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(125,249,255,0.4);
}

/* toggle text */
.switch {
  text-align:center;
  margin-top:15px;
  font-size:13px;
  color:#aaa;
}

.switch button {
  background:none;
  border:none;
  color:#7df9ff;
  cursor:pointer;
}

/* icons */
.icons {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:15px;
}

.icons i {
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}

.icons i:hover {
  color:#7df9ff;
  transform:scale(1.2);
}

/* glow border animation */
.container::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:16px;
  padding:1px;
  background:linear-gradient(45deg,#7df9ff,transparent,#6c63ff);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  pointer-events:none;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">VOXELIAFORGE</div>

  <!-- LOGIN -->
  <div id="loginBox">
    <div class="input">
      <i class="ri-mail-line"></i>
      <input id="email" placeholder="Email">
    </div>

    <div class="input">
      <i class="ri-lock-line"></i>
      <input id="password" type="password" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Access Portal</button>

    <div class="icons">
      <i class="ri-google-fill"></i>
      <i class="ri-github-fill"></i>
    </div>

    <div class="switch">
      No account? <button onclick="showSignup()">Create one</button>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" style="display:none;">
    <div class="input">
      <i class="ri-user-line"></i>
      <input id="name" placeholder="Username">
    </div>

    <div class="input">
      <i class="ri-mail-line"></i>
      <input id="newEmail" placeholder="Email">
    </div>

    <div class="input">
      <i class="ri-lock-line"></i>
      <input id="newPassword" type="password" placeholder="Password">
    </div>

    <button class="btn" onclick="signup()">Create Account</button>

    <div class="switch">
      Already have one? <button onclick="showLogin()">Sign in</button>
    </div>
  </div>
</div>

<script type="module">
let auth, createUserWithEmailAndPassword, signInWithEmailAndPassword;

async function loadFirebase() {
  if (auth) return;

  const app = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
  const a = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "voxeliaforge-v589m.firebaseapp.com",
    projectId: "voxeliaforge-v589m"
  };

  const appInit = app.initializeApp(firebaseConfig);

  auth = a.getAuth(appInit);
  createUserWithEmailAndPassword = a.createUserWithEmailAndPassword;
  signInWithEmailAndPassword = a.signInWithEmailAndPassword;
}

window.login = async () => {
  await loadFirebase();
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
    alert("Access granted");
    window.location.href = "index.html";
  } catch (e) {
    alert(e.message);
  }
};

window.signup = async () => {
  await loadFirebase();
  try {
    await createUserWithEmailAndPassword(
      auth,
      newEmail.value,
      newPassword.value
    );
    alert("Account created");
    showLogin();
  } catch (e) {
    alert(e.message);
  }
};

window.showSignup = () => {
  loginBox.style.display = "none";
  signupBox.style.display = "block";
};

window.showLogin = () => {
  signupBox.style.display = "none";
  loginBox.style.display = "block";
};
</script>

</body>
</html>
