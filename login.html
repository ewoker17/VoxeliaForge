<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxeliaForge | Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 1. Firebase UI Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@firebase-oss/ui-styles/dist/dist.min.css">
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    :root {
      /* YOUR CUSTOM NEON THEME */
      --fui-background: #0d0e12;      /* Vault Dark */
      --fui-primary: #7df9ff;         /* Neon Cyan */
      --fui-primary-hover: #00f2ff;   /* Glowing Cyan */
      --fui-primary-surface: #000;    /* Text on Cyan buttons */
      --fui-text: #e0e0e0;            /* Light gray text */
      --fui-text-muted: #808090;      /* Dim text */
      --fui-border: #1f1f2e;          /* Border color */
      --fui-input: #060608;           /* Input background */
      --fui-error: #ff3e3e;           /* Security alert red */
      --fui-radius: 8px;
      --fui-radius-card: 20px;
    }

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #060608; /* Deep black background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Adds the neon glow to the login card */
    #firebaseui-auth-container {
      box-shadow: 0 0 30px rgba(125, 249, 255, 0.1);
      border: 1px solid rgba(125, 249, 255, 0.1);
      border-radius: 20px;
    }

    h1 {
      color: #7df9ff;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div>
    <h1>System Access</h1>
    <!-- The Firebase UI will load inside this div -->
    <div id="firebaseui-auth-container"></div>
  </div>

  <!-- 2. Firebase SDKs -->
  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>

  <script>
    // YOUR CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDyNeuKeRalGTilS76hdUYRDilF0CFKWrM",
      authDomain: "://firebaseapp.com",
      projectId: "voxeliaforge-v589m",
      storageBucket: "voxeliaforge-v589m.firebasestorage.app",
      messagingSenderId: "300204829415",
      appId: "1:300204829415:web:c73f00c6eaaa03c5669042"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Initialize the FirebaseUI Widget
    const ui = new firebaseui.auth.AuthUI(firebase.auth());

    ui.start('#firebaseui-auth-container', {
      signInSuccessUrl: 'index.html',
      signInOptions: [
        firebase.auth.EmailAuthProvider.PROVIDER_ID,
        firebase.auth.GoogleAuthProvider.PROVIDER_ID
      ],
      // Set to true to show the UI in Dark Mode by default
      darkTheme: true 
    });
  </script>
</body>
</html>
