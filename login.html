<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxeliaForge | Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://jsdelivr.net">
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    :root {
      --fui-background: #0d0e12;
      --fui-primary: #7df9ff;
      --fui-primary-hover: #00f2ff;
      --fui-primary-surface: #000;
      --fui-text: #e0e0e0;
      --fui-text-muted: #808090;
      --fui-border: #1f1f2e;
      --fui-input: #060608;
      --fui-error: #ff3e3e;
      --fui-radius: 8px;
      --fui-radius-card: 20px;
    }

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #000; /* Pure black for a seamless look */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 🔥 HIDDEN BY DEFAULT TO PREVENT THE LOADING LINE */
    #firebaseui-auth-container {
      display: none; 
      box-shadow: 0 0 30px rgba(125, 249, 255, 0.15);
      border: 1px solid rgba(125, 249, 255, 0.1);
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
    }

    /* FORCES ALL LOADERS OFF */
    .mdl-progress, 
    .firebaseui-busy-indicator, 
    .firebaseui-callback-indicator { 
      display: none !important; 
    }
  </style>
</head>
<body>

  <div id="firebaseui-auth-container"></div>

  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDyNeuKeRalGTilS76hdUYRDilF0CFKWrM",
      authDomain: "://firebaseapp.com",
      projectId: "voxeliaforge-v589m",
      storageBucket: "voxeliaforge-v589m.firebasestorage.app",
      messagingSenderId: "300204829415",
      appId: "1:300204829415:web:c73f00c6eaaa03c5669042"
    };

    firebase.initializeApp(firebaseConfig);
    const ui = new firebaseui.auth.AuthUI(firebase.auth());

    ui.start('#firebaseui-auth-container', {
      signInSuccessUrl: 'index.html',
      signInOptions: [
        firebase.auth.EmailAuthProvider.PROVIDER_ID,
        firebase.auth.GoogleAuthProvider.PROVIDER_ID
      ],
      callbacks: {
        // 🔥 REVEALS THE FORM ONLY WHEN FULLY LOADED
        uiShown: function() {
          document.getElementById('firebaseui-auth-container').style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
