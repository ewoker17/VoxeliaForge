<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxeliaForge | Access Portal</title>
  <!-- Remix Icons for the eyes and locks -->
  <link href="https://jsdelivr.net" rel="stylesheet">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap");
    :root {
      --white-color: hsl(0,0%,100%);
      --black-color: hsl(0, 0% , 0%);
      --body-font: "Poppins", sans-serif; 
      --h1-font-size: 1.75rem;
      --normal-font-size: 1rem;
      --small-font-size: .813rem;
      --font-medium: 500; 
    }

    * { box-sizing: border-box; padding: 0; margin: 0; }
    body, input, button { font-size: var(--normal-font-size); font-family: var(--body-font); }
    body { color: var(--white-color); background-color: var(--black-color); }
    input, button { border: none; outline: none; }
    a { text-decoration: none; }
    img { max-width: 100%; height: auto; }

    .login { position: relative; height: 100vh; display: grid; align-items: center; overflow: hidden; }
    .login__img { position: absolute; width: 100%; height: 100%; object-fit: cover; object-position: center; z-index: -1; }
    
    .login__form {
      position: relative;
      background-color: hsla(0, 0%, 10%, 0.1);
      border: 2px solid var(--white-color);
      margin-inline: 1.5rem;
      padding: 2.5rem 1.5rem;
      border-radius: 1rem;
      backdrop-filter: blur(8px);
    }

    .login__title { text-align: center; font-size: var(--h1-font-size); font-weight: var(--font-medium); margin-bottom: 2rem; text-transform: uppercase; }
    .login__content, .login__box { display: grid; }
    .login__content { row-gap: 1.75rem; margin-bottom: 1.5rem; }
    .login__box { grid-template-columns: max-content 1fr; align-items: center; column-gap: 0.75rem; border-bottom: 2px solid var(--white-color); }
    .login__icon, .login__eye { font-size: 1.25rem; }
    .login__input { width: 100%; padding-block: 0.8rem; background: none; color: var(--white-color); position: relative; z-index: 1; }
    .login__box-input { position: relative; width: 100%; }
    .login__label { position: absolute; left: 0; top: 13px; font-weight: var(--font-medium); transition: top 0.3s, font-size 0.3s; pointer-events: none; }
    .login__eye { position: absolute; right: 0; top: 18px; z-index: 10; cursor: pointer; }

    /* Animation logic */
    .login__input:focus + .login__label,
    .login__input:not(:placeholder-shown) + .login__label { top: -12px; font-size: var(--small-font-size); color: #7df9ff; }

    .login__check, .login__check-group { display: flex; align-items: center; justify-content: space-between; }
    .login__check { margin-bottom: 1.5rem; }
    .login__check-label, .login__forgot, .login__register { font-size: var(--small-font-size); }
    .login__check-group { column-gap: 0.5rem; }
    .login__forgot { color: var(--white-color); }
    .login__forgot:hover { text-decoration: underline; }
    
    .login__button { width: 100%; padding: 1rem; border-radius: 0.5rem; background-color: var(--white-color); font-weight: var(--font-medium); cursor: pointer; margin-bottom: 1rem; transition: .3s; }
    .login__button:hover { box-shadow: 0 0 15px rgba(255,255,255,0.5); }

    .login__google {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.5rem;
      background-color: transparent;
      border: 1px solid var(--white-color);
      color: var(--white-color);
      font-weight: var(--font-medium);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
      transition: .3s;
    }
    .login__google:hover { background-color: rgba(255,255,255,0.1); }

    .login__register { text-align: center; }
    .login__register a { color: var(--white-color); font-weight: var(--font-medium); }
    .login__register a:hover { text-decoration: underline; }

    @media screen and (min-width: 576px) {
      .login { justify-content: center; }
      .login__form { width: 432px; padding: 4rem 3rem 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="login">
    <img src="login-bg.png" alt="login image" class="login__img">

    <form id="loginForm" class="login__form">
      <h1 class="login__title">Login</h1>

      <div class="login__content">
        <div class="login__box">
          <i class="ri-user-3-line login__icon"></i>
          <div class="login__box-input">
            <input type="email" id="email" required class="login__input" placeholder=" ">
            <label class="login__label">Email</label>
          </div>
        </div>

        <div class="login__box">
          <i class="ri-lock-2-line login__icon"></i>
          <div class="login__box-input">
            <input type="password" id="password" required class="login__input" placeholder=" ">
            <label class="login__label">Password</label>
            <i class="ri-eye-off-line login__eye" id="login-eye"></i>
          </div>
        </div>
      </div>

      <div class="login__check">
        <div class="login__check-group">
          <input type="checkbox" class="login__check-input">
          <label class="login__check-label">Remember me</label>
        </div>
        <a href="#" class="login__forgot">Forgot Password?</a>
      </div>

      <button type="submit" class="login__button">Login</button>
      
      <button type="button" id="googleBtn" class="login__google">
        <img src="https://gstatic.com" width="18">
        Sign in with Google
      </button>

      <p class="login__register">
        Don't have an account? <a href="signup.html">Register</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://gstatic.com";

    const firebaseConfig = {
      apiKey: "AIzaSyDyNeuKeRalGTilS76hdUYRDilF0CFKWrM",
      authDomain: "://firebaseapp.com",
      projectId: "voxeliaforge-v589m",
      storageBucket: "voxeliaforge-v589m.firebasestorage.app",
      messagingSenderId: "300204829415",
      appId: "1:300204829415:web:c73f00c6eaaa03c5669042"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Email/Password Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      signInWithEmailAndPassword(auth, email, pass)
        .then(() => window.location.href = "index.html")
        .catch(err => alert("Error: " + err.message));
    });

    // Google Login
    document.getElementById('googleBtn').onclick = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(() => window.location.href = "index.html")
        .catch(err => alert("Google Error: " + err.message));
    };

    // Password Visibility Toggle
    const showHiddenPass = (loginPass, loginEye) =>{
      const input = document.getElementById(loginPass),
            iconEye = document.getElementById(loginEye)

      iconEye.addEventListener('click', () =>{
        if(input.type === 'password'){
          input.type = 'text'
          iconEye.classList.add('ri-eye-line')
          iconEye.classList.remove('ri-eye-off-line')
        } else {
          input.type = 'password'
          iconEye.classList.remove('ri-eye-line')
          iconEye.classList.add('ri-eye-off-line')
        }
      })
    }
    showHiddenPass('password', 'login-eye');
  </script>
</body>
</html>
