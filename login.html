<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxeliaForge Login</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Orbitron', sans-serif; background: #0a0a0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-container { background: #12121a; padding: 40px; border-radius: 20px; width: 320px; box-shadow: 0 0 20px rgba(125, 249, 255, 0.2); border: 1px solid #1f1f2e; text-align: center; }
    h1 { color: #7df9ff; margin-bottom: 20px; text-shadow: 0 0 10px #7df9ff; }
    form { display: flex; flex-direction: column; text-align: left; }
    label { margin-bottom: 5px; font-weight: bold; font-size: 11px; }
    input { padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #1f1f2e; background: #0a0a0f; color: white; outline: none; }
    button { padding: 12px; border-radius: 20px; border: none; background: #7df9ff; color: black; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-bottom: 10px; transition: 0.3s; }
    button:hover { background: #5fd3d8; opacity: 0.9; }
    .google-btn { background: #fff; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { background: #eee; }
    .link { margin-top: 15px; font-size: 0.8em; }
    .link a { color: #7df9ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <form id="loginForm">
      <label>Email Address</label>
      
      <label>Access Key</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <button type="submit">Initialize Link</button>
    </form>
    <div style="width: 100%; height: 1px; background: #222; margin: 10px 0;"></div>
    <button class="google-btn" id="googleBtn">
      <img src="https://gstatic.com" width="18"> Sign in with Google
    </button>
    <div class="link">New Identity? <a href="signup.html">Sign Up</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://gstatic.com";

    const firebaseConfig = {
      apiKey: "AIzaSyDyNeuKeRalGTilS76hdUYRDilF0CFKWrM",
      authDomain: "voxeliaforge-v589m.firebaseapp.com",
      projectId: "voxeliaforge-v589m",
      storageBucket: "voxeliaforge-v589m.firebasestorage.app",
      messagingSenderId: "300204829415",
      appId: "1:300204829415:web:c73f00c6eaaa03c5669042"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
        .then(() => window.location.href = "index.html")
        .catch(err => alert("Auth Failed: " + err.message));
    });

    document.getElementById('googleBtn').onclick = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(() => window.location.href = "index.html")
        .catch(err => alert("Google Auth Error: " + err.message));
    };
  </script>
</body>
</html>
